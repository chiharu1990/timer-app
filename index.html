<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>とりあえず５分タイマー</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="first-view">
      <div class="head">
        <p class="head-txt">とりあえず、はじめよう</p>
        <h1 class="head-title">５分タイマー</h1>
        <p class="head-txt">まず、何分やる？</p>
      </div>
      <div class="timer-select">
        <button id="timer-fiveMinutes" class="timer-btn">
          <span class="txt">とりあえず、5分</span>
          <span class="time">05:00</span>
        </button>
        <button id="timer-tenMinutes" class="timer-btn">
          <span class="txt">一旦、10分</span>
          <span class="time">10:00</span>
        </button>
      </div>
    </div>

    <div class="timer-view">
      <p class="timer-view__icon">取組中</p>
      <div class="timer-container">
        <div class="timer-display-container">
          <p id="timer-display">00:00</p>
          <p class="timer-view__time"><span id="timer-view-timeCount">5</span>分間</p>
        </div>
        <div class="timer-view__progress-bar">
          <svg viewBox="0 0 200 200" width="200" height="200" fill="none">
            <!-- 背景となる円 -->
            <circle cx="100" cy="100" r="95" stroke="lightgray" stroke-width="10"/>
            <!-- 進捗を表す円 -->
            <circle cx="100" cy="100" r="95" stroke="#0F6E56" stroke-width="10" stroke-dasharray="596.6 596.6" stroke-dashoffset="0" stroke-linecap="round" class="timer-view__progress-circle"/>
          </svg>
        </div>
      </div>
      <p class="timer-view__setCount">セット回数：<span id="timer-view-setCount">1</span>回目</p>
      <button id="timer-pause" class="pause-btn">
        <span class="pause-btn__icon">
          <svg width="16" height="16">
            <use href="/img/icons.svg#pause"/>
          </svg>
        </span>
        <span class="pause-btn__txt">一時停止</span>
      </button>
    </div>

    <div class="repetition-view">
      <div class="head">
        <p class="head-txt">タイマー終了</p>
        <p class="head-title">おつかれさま！</p>
      </div>
      <div class="repetition-btnList">
        <button id="timer-repetition" class="repetition-btn -full">繰り返す</button>
        <button id="repetition-fiveMinutes" class="repetition-btn">あと5分やる</button>
        <button id="repetition-tenMinutes" class="repetition-btn">あと10分やる</button>
        <button id="timer-end" class="repetition-btn -full">今日はもう終わる</button>
      </div>
    </div>

    <div class="end-view">
      <div class="head">
        <p class="head-txt">おつかれさまでした</p>
        <div class="setCount">
          <p id="totalSetCount-display" class="setCount-num">1</p>
          <p class="setCount-txt">セット完了</p>
        </div>
        <p class="totalTime-txt">今日は合計<span id="totalTime-display" class="total-time">○分</span>集中しました</p>
      </div>
      <div class="beginning-area">
        <p class="beginning-txt">また明日も頑張ろう〜！</p>
        <button id="start-beginning" class="beginning-btn">最初からはじめる</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
